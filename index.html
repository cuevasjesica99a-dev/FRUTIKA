<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SISTEMA RELEVAMIENTO FRUTIKA - COMPLETO</title>
  <style>
    :root { --rojo: #d32f2f; --verde: #2e7d32; --amarillo: #fbc02d; --azul: #0288d1; --gris: #f4f6f8; }
    body { font-family: 'Segoe UI', sans-serif; background: var(--gris); padding: 10px; margin: 0; text-transform: uppercase; }
    .container { background: white; padding: 20px; border-radius: 12px; max-width: 650px; margin: auto; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    h2 { text-align: center; color: var(--rojo); margin: 0; }
    h4 { text-align: center; color: #666; margin-bottom: 20px; font-size: 11px; letter-spacing: 1px; }
    label { font-weight: bold; display: block; margin-top: 15px; color: #333; font-size: 12px; }
    input, select { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; text-transform: uppercase; font-size: 13px; }
    
    .selector-secciones { display: flex; gap: 10px; margin: 20px 0; }
    .btn-tab { flex: 1; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; background: #e0e0e0; color: #666; transition: 0.3s; font-size: 12px; }
    .btn-tab.active-venc { background: var(--amarillo); color: black; }
    .btn-tab.active-aver { background: var(--rojo); color: white; }

    .pregunta-contenedor { background: #f9f9f9; padding: 15px; border-radius: 10px; margin-bottom: 15px; text-align: center; border: 1px solid #ddd; }
    .botones-decision { display: flex; gap: 10px; max-width: 220px; margin: auto; margin-top: 10px; }
    .btn-sn { flex: 1; padding: 10px; border: 2px solid #ddd; border-radius: 6px; background: white; cursor: pointer; font-weight: bold; }
    .active-si { background: var(--verde) !important; color: white; border-color: var(--verde); }
    .active-no { background: var(--rojo) !important; color: white; border-color: var(--rojo); }

    .seccion-productos { display: none; margin-top: 10px; }
    .producto-row { background: white; padding: 15px; margin-bottom: 10px; border-left: 5px solid var(--amarillo); border-radius: 4px; border: 1px solid #eee; }
    .btn-add { background: var(--azul); color: white; width: 100%; padding: 15px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px; }
    .btn-remove { background: #ff5252; color: white; font-size: 10px; padding: 6px 10px; border: none; border-radius: 4px; margin-top: 10px; cursor: pointer; float: right; }
    .btn-enviar { width: 100%; background: var(--rojo); color: white; margin-top: 30px; font-size: 18px; padding: 20px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
  </style>
</head>
<body>

<div class="container">
  <h2>FRUTIKA</h2>
  <h4>CONTROL DE CALIDAD</h4>

  <form id="formulario">
    <label>NOMBRE DEL RELEVADOR</label>
    <select id="vendedor" required onchange="actualizarPDV()">
      <option value="">SELECCIONE...</option>
      <option>GLORIA MARTINEZ</option>
      <option>MICAELA PAREDES</option>
      <option>ANA PIZURNO</option>
      <option>TOBÍAS BURGOS</option>
      <option>MARCO ZALAZAR</option>
      <option>MARIA VERON</option>
      <option>AURELIO CÁCERES</option>
      <option>FERNANDO BENITEZ</option>
      <option>EDITH DUARTE</option>
      <option>GRISELDA MARTINEZ</option>
      <option>HUGO GÓMEZ</option>
      <option>JOEL ORTIZ</option>
      <option>YENNIFER ADORNO</option>
      <option>CINTHIA CRISTALDO</option>
      <option>YURIA VERA</option>
    </select>

    <label>PUNTO DE VENTA</label>
    <select id="pdv" required>
      <option value="">-- SELECCIONE RELEVADOR --</option>
    </select>

    <div class="selector-secciones">
        <button type="button" id="tab-venc" class="btn-tab active-venc" onclick="cambiarTab('venc')">📅 PRÓXIMOS A VENCER</button>
        <button type="button" id="tab-aver" class="btn-tab" onclick="cambiarTab('aver')">⚠️ AVERIADOS</button>
    </div>

    <div id="panel-vencidos">
        <div class="pregunta-contenedor">
            <span style="font-size: 11px; font-weight: bold;">¿HAY PRODUCTOS PRÓXIMOS A VENCER?</span>
            <div class="botones-decision">
              <button type="button" id="venc-si" class="btn-sn" onclick="decidirCarga('venc', true)">SÍ</button>
              <button type="button" id="venc-no" class="btn-sn" onclick="decidirCarga('venc', false)">NO</button>
            </div>
        </div>
        <div id="seccion-vencidos" class="seccion-productos">
            <div id="cont-vencidos"></div>
            <button type="button" class="btn-add" onclick="agregarFila('venc')">+ AÑADIR PRODUCTO</button>
        </div>
    </div>

    <div id="panel-averiados" style="display:none;">
        <div class="pregunta-contenedor">
            <span style="font-size: 11px; font-weight: bold;">¿HAY PRODUCTOS AVERIADOS?</span>
            <div class="botones-decision">
              <button type="button" id="aver-si" class="btn-sn" onclick="decidirCarga('aver', true)">SÍ</button>
              <button type="button" id="aver-no" class="btn-sn" onclick="decidirCarga('aver', false)">NO</button>
            </div>
        </div>
        <div id="seccion-averiados" class="seccion-productos">
            <div id="cont-averiados"></div>
            <button type="button" class="btn-add" onclick="agregarFila('aver')">+ AÑADIR AVERÍA</button>
        </div>
    </div>

    <button type="submit" class="btn-enviar" id="btnEnvio">ENVIAR REPORTE</button>
  </form>
</div>

<script>
const datosPDV = {

  "ANA PIZURNO": ["GRAN VIA - ASUNCION", "LA BOMBA - PROCERES", "CADENA REAL - FELIX BOGADO", "FORTIS - JOCKEY", "VILLA SOFIA - SAJONIA", "PACIFICO - SAJONIA", "HIPERMERCADO LUISITO - FELIX BOGADO", "HUPERMERCADO PUEBLO - SAN VICENTE"],
  "TOBÍAS BURGOS": ["CASA RICA - LOS LAURELES", "SALEMMA - SUPER CENTER", "CADENA REAL - FERNANDO DE LA MORA", "HIPERMERCADOS PUEBLO - FERNANDO DE LA MORA", "SALEMMA - MULTIPLAZA"],

  "HUGO GÓMEZ": ["HIPER MERCADO LUISITO - LUQUE", "VILLA SOFIA - LUQUE", "SUPERMERCADO LT - MORA CUE LUQUE", "GRAN VIA - LUQUE", "LOS JARDINES - VILLA ADELA", "LO JARDINES - MORA CUE", "LOS JARDINES - PRIMAVERA", "LOS JARDINES - GRAL AQUINO", "AHO AHO COMERCIAL"],
  "JOEL ORTIZ": ["CASA GRUTTER - DEFENSORES", "CASA GRUTTER - ABASTO", "CASA GRUTTER - SAPROCAL CASA FRESCA", "SUPERMAS - ABASTO", "SUPERMERCADO MARANGATU", "FORTIS - ABASTO", "HIPERMERCADO LUISITO - EUSEBIO AYALA"],
  "YENNIFER ADORNO": ["SUPERMERCADO COLON - GUARAMBARE", "HIPERMERCADO LUISITO - YPANE", "SUPERMERCADO SANTA RITA R1", "EL AHORRAZO - CAPIATA R1", "ÑA NICA", "HUPERMERCADO LUISITO - CAPIATA R1", "CADENA REAL - CAPIATA R1"],
  "CINTHIA CRISTALDO": ["SUPERMERCADO CHORTITZER", "ECOP LOMA PLATA", "ECOP PIONEROS", "ECOP BIOCEANICA", "ECOP BERGFELD"],
  "YURIA VERA": ["LT CASA CENTRAL", "LT EXPRESS", "LT SAN JOSE", "LT VILLA HAYES", "LT VILLA MADRID", "LT MBAYUE", "LT EMBOSCADA", "LUISITO LIMPIO", "LT RINCON", "LT COSTA BENJAMIN"]
};

const listaProductos = `
  <option value="">SELECCIONE PRODUCTO...</option>
  <optgroup label="AGUAS GÉNESIS">
    <option>7840117011680 - AGUA MINERAL SIN GAS 500 ML GÉNESIS</option>
    <option>7840117011697 - AGUA MINERAL SIN GAS 1 L GÉNESIS</option>
    <option>7840117011703 - AGUA MINERAL SIN GAS 2,25 L GÉNESIS</option>
    <option>7840117012045 - PROMO PACK X4 AGUA MINERAL SIN GAS 2,25 L GENESIS</option>
    <option>7840117011710 - AGUA MINERAL CON GAS 500 ML GÉNESIS</option>

    <option>7840117011833 - AGUA FUNCIONAL CARE 500 ML GÉNESIS</option>
    <option>7840117012007 - AGUA FUNCIONAL FIBER GREEN 500 ML GÉNESIS</option>
    <option>7840117011994 - AGUA FUNCIONAL YOUNG 500 ML GÉNESIS</option>
  </optgroup>
  <optgroup label="JUGOS Y NÉCTARES">
    <option>7840117008031 - JUGO 100% MULTI 7 1 L FRUTIKA</option>
    <option>7840117011932 - JUGO 100% NARANJA 1 L FRUTIKA</option>
    <option>7840117011659 - JUGO 100% MIX 1 L FRUTIKA</option>
    <option>7840117012243 - JUGO 100% NARANJA SLIM 200 ML FRUTIKA</option>
    <option>7840117001025 - NECTAR DE NARANJA SLIM 200 ML FRUTIKA</option>
    <option>7840117002022 - NECTAR DE MANZANA SLIM 200 ML FRUTIKA</option>
    <option>7840117004026 - NECTAR DE DURAZNO SLIM 200 ML FRUTIKA</option>
    <option>7840117001018 - NECTAR DE NARANJA 1 L FRUTIKA</option>
    <option>7840117003012 - NECTAR DE POMELO 1 L FRUTIKA</option>
    <option>7840117002015 - NECTAR DE MANZANA 1 L FRUTIKA</option>
    <option>7840117004019 - NECTAR DE DURAZNO 1 L FRUTIKA</option>
    <option>7840117005016 - NECTAR DE GUAYABA 1 L FRUTIKA</option>
    <option>7840117001032 - NECTAR LIGHT DE NARANJA 1 L FRUTIKA</option>
    <option>7840117004033 - NECTAR LIGHT DE DURAZNO 1 L FRUTIKA</option>

  <optgroup label="SALSAS Y TOMATES">

    <option>7840117010362 - EXTRACTO DE TOMATE TETRA 140 G PERITA</option>
    <option>7840117010379 - EXTRACTO DE TOMATE TETRA 70 G PERITA</option>
    <option>7840117012267 - EXTRACTO DE TOMATE DOYPACK 140 G PERITA</option>
    <option>7840117012274 - EXTRACTO DE TOMATE DOYPACK 70 G PERITA</option>
    <option>7840117011567 - PURE DE TOMATE SLIM 220 G FRUTIKA</option>
    <option>7840117011987 - SALSA PIZZA DOYPACK 300 G FRUTIKA</option>
    <option>7840117011963 - SALSA FILETTO DOYPACK 300 G FRUTIKA</option>
    <option>7840117011970 - SALSA POMAROLA DOYPACK 300 G FRUTIKA</option>
    <option>7840117011574 - SALSA PIZZA TETRA 220 G FRUTIKA</option>

  </optgroup>
  <optgroup label="CONDIMENTOS">
    <option>7840117010782 - CHIMICHURRI SIN PICANTE 400 G FRUTIKA</option>
    <option>7840117010942 - CHIMICHURRI PICANTE 400 G FRUTIKA</option>
    <option>7840117010454 - KETCHUP SIN PICANTE 400 G FRUTIKA</option>
    <option>7840117011345 - KETCHUP SIN PICANTE 3 KG PERITA</option>
    <option>7840117011352 - KETCHUP SIN PICANTE 160 ML PERITA</option>
    <option>7840117010645 - KETCHUP PICANTE 400 G FRUTIKA</option>
    <option>7840117010485 - AJI PICANTE 150 ML FRUTIKA</option>
  </optgroup>`;

function actualizarPDV() {
  const v = document.getElementById("vendedor").value;
  const c = document.getElementById("pdv");
  c.innerHTML = '<option value="">-- SELECCIONE PDV --</option>';
  if (v && datosPDV[v]) {
    datosPDV[v].forEach(p => {
      let o = document.createElement("option"); o.value = p; o.textContent = p; c.appendChild(o);
    });
  }
}

function cambiarTab(t) {
  document.getElementById('panel-vencidos').style.display = (t === 'venc') ? 'block' : 'none';
  document.getElementById('panel-averiados').style.display = (t === 'aver') ? 'block' : 'none';
  document.getElementById('tab-venc').className = (t === 'venc') ? 'btn-tab active-venc' : 'btn-tab';
  document.getElementById('tab-aver').className = (t === 'aver') ? 'btn-tab active-aver' : 'btn-tab';
}

let respuestas = { venc: null, aver: null };

function decidirCarga(tipo, tiene) {
  respuestas[tipo] = tiene;
  document.getElementById(`${tipo}-si`).className = tiene ? 'btn-sn active-si' : 'btn-sn';
  document.getElementById(`${tipo}-no`).className = !tiene ? 'btn-sn active-no' : 'btn-sn';
  document.getElementById(`seccion-${tipo === 'venc' ? 'vencidos' : 'averiados'}`).style.display = tiene ? "block" : "none";
  const cont = document.getElementById(`cont-${tipo === 'venc' ? 'vencidos' : 'averiados'}`);
  if (tiene && cont.children.length === 0) agregarFila(tipo);
}

function agregarFila(tipo) {
  const contenedor = document.getElementById(`cont-${tipo === 'venc' ? 'vencidos' : 'averiados'}`);
  const div = document.createElement("div");
  div.className = "producto-row";
  if(tipo === 'aver') div.style.borderLeftColor = "var(--rojo)";
  div.innerHTML = `
    <label>PRODUCTO</label><select class="p-prod" required>${listaProductos}</select>
    <div style="display:flex; gap:10px; margin-top:10px;">
      <div style="flex:2">${tipo === 'venc' ? '<label>VENCIMIENTO</label><input type="date" class="p-extra" required>' : '<label>OBSERVACIÓN</label><input type="text" class="p-extra" placeholder="GOLPE" required>'}</div>
      <div style="flex:1"><label>CANT.</label><input type="number" class="p-cant" min="1" required></div>
    </div>
    <button type="button" class="btn-remove" onclick="this.parentElement.remove()">ELIMINAR</button><div style="clear:both"></div>`;
  contenedor.appendChild(div);
}

document.getElementById("formulario").onsubmit = function(e) {
  e.preventDefault();
  if (respuestas.venc === null || respuestas.aver === null) {
    alert("DEBE COMPLETAR EL APARTADO DE PRÓXIMOS A VENCER Y EL DE AVERIADOS."); return;
  }

  const btn = document.getElementById("btnEnvio");
  btn.disabled = true; btn.innerText = "ENVIANDO...";

  const listaVencidos = [];
  document.querySelectorAll("#cont-vencidos .producto-row").forEach(r => {
    listaVencidos.push({
      producto: r.querySelector(".p-prod").value,
      fechaVenc: r.querySelector(".p-extra").value,
      cantidad: r.querySelector(".p-cant").value
    });
  });

  const listaAveriados = [];
  document.querySelectorAll("#cont-averiados .producto-row").forEach(r => {
    listaAveriados.push({
      producto: r.querySelector(".p-prod").value,
      observacion: r.querySelector(".p-extra").value,
      cantidad: r.querySelector(".p-cant").value
    });
  });

  const payload = {
    fecha: new Date().toLocaleString(),
    relevador: document.getElementById("vendedor").value,
    pdv: document.getElementById("pdv").value,
    tieneVencidos: respuestas.venc,
    tieneAveriados: respuestas.aver,
    listaVencidos: listaVencidos,
    listaAveriados: listaAveriados
  };

  const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbzHyKyJcUPn_ciWXZ30rW9WTNThfVxJzSYP85L7o52xn0_2ulgOhpJEokjgtDzmYsI/exec"; 

  fetch(URL_SCRIPT, {
    method: "POST",
    mode: "no-cors",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload)
  })
  .then(() => {
    alert("¡REPORTE ENVIADO CON ÉXITO!");
    location.reload();
  })
  .catch(err => {
    alert("ERROR AL ENVIAR");
    btn.disabled = false; btn.innerText = "REINTENTAR";
  });
};
</script>
</body>
</html>
