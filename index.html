<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SISTEMA RELEVAMIENTO FRUTIKA - OFICIAL</title>
  <style>
    :root { 
      --verde-frutika: #00703c; 
      --verde-claro: #e8f5e9;
      --rojo-frutika: #d32f2f; 
      --amarillo-frutika: #fbc02d; 
      --gris-fondo: #f0f2f5; 
      --blanco: #ffffff;
    }
    body { font-family: 'Segoe UI', Roboto, sans-serif; background: var(--gris-fondo); padding: 10px; margin: 0; text-transform: uppercase; }
    .container { background: var(--blanco); padding: 25px; border-radius: 15px; max-width: 650px; margin: auto; box-shadow: 0 8px 25px rgba(0,0,0,0.1); border-top: 8px solid var(--verde-frutika); }
    .header-frutika { text-align: center; margin-bottom: 25px; }
    .header-frutika h2 { font-family: 'Brush Script MT', cursive; color: var(--verde-frutika); font-size: 48px; margin: 0; text-transform: none; }
    .header-frutika h4 { color: #555; margin: 0; font-size: 12px; letter-spacing: 3px; font-weight: bold; }
    label { font-weight: bold; display: block; margin-top: 20px; color: var(--verde-frutika); font-size: 13px; }
    input, select { width: 100%; padding: 14px; margin-top: 6px; border: 2px solid #e0e0e0; border-radius: 8px; box-sizing: border-box; text-transform: uppercase; font-size: 14px; }
    .p-prod { border: 2px solid var(--verde-frutika) !important; background-color: var(--verde-claro); font-weight: bold; }
    .input-error { border: 3px solid var(--rojo-frutika) !important; background-color: #ffebee !important; }
    .msg-error { color: var(--rojo-frutika); font-size: 10px; font-weight: bold; margin-top: 5px; display: none; }
    .selector-secciones { display: flex; gap: 12px; margin: 25px 0; }
    .btn-tab { flex: 1; padding: 16px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; background: #e0e0e0; color: #666; transition: 0.3s; font-size: 12px; }
    .btn-tab.active-venc { background: var(--amarillo-frutika); color: #333; }
    .btn-tab.active-aver { background: var(--rojo-frutika); color: white; }
    .pregunta-contenedor { background: var(--verde-claro); padding: 20px; border-radius: 12px; margin-bottom: 20px; text-align: center; border: 1px solid #c8e6c9; }
    .botones-decision { display: flex; gap: 15px; max-width: 250px; margin: auto; margin-top: 15px; }
    .btn-sn { flex: 1; padding: 12px; border: 2px solid #ccc; border-radius: 8px; background: white; cursor: pointer; font-weight: bold; }
    .active-si { background: var(--verde-frutika) !important; color: white; border-color: var(--verde-frutika); }
    .active-no { background: var(--rojo-frutika) !important; color: white; border-color: var(--rojo-frutika); }
    .seccion-productos { display: none; margin-top: 15px; }
    .producto-row { background: white; padding: 18px; margin-bottom: 15px; border-left: 6px solid var(--verde-frutika); border-radius: 8px; border: 1px solid #eee; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    .btn-add { background: var(--verde-frutika); color: white; width: 100%; padding: 16px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; }
    .btn-remove { background: #ff5252; color: white; font-size: 11px; padding: 8px 12px; border: none; border-radius: 5px; margin-top: 12px; cursor: pointer; float: right; font-weight: bold; }
    .btn-enviar { width: 100%; background: var(--verde-frutika); color: white; margin-top: 40px; font-size: 18px; padding: 22px; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; }
    .checklist-container { background: #fafafa; border: 1px solid #ddd; padding: 10px; border-radius: 8px; margin-top: 8px; }
    .check-item { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; cursor: pointer; font-size: 12px; }
    .check-item input[type="checkbox"] { width: 18px; height: 18px; margin: 0; cursor: pointer; }
    .banner-carga { background: var(--amarillo-frutika); color: #333; text-align: center; padding: 12px; border-radius: 8px; font-weight: bold; font-size: 12px; margin-bottom: 20px; }
  </style>
</head>
<body>

<div class="container">
  <div class="header-frutika">
    <h2>Frutika</h2>
    <h4>CONTROL DE CALIDAD</h4>
  </div>

  <div class="banner-carga" id="banner-carga">⏳ CARGANDO DATOS DEL SERVIDOR...</div>

  <form id="formulario" style="display:none;">
    <label>NOMBRE DEL RELEVADOR</label>
    <input type="text" id="vendedor" list="lista-relevadores" placeholder="ESCRIBA O BUSQUE SU NOMBRE..." required onchange="actualizarPDV()" autocomplete="off">
    <datalist id="lista-relevadores"></datalist>

    <label>PUNTO DE VENTA</label>
    <select id="pdv" required>
      <option value="">-- SELECCIONE RELEVADOR PRIMERO --</option>
    </select>

    <div class="selector-secciones">
      <button type="button" id="tab-venc" class="btn-tab active-venc" onclick="cambiarTab('venc')">📅 PRÓXIMOS A VENCER</button>
      <button type="button" id="tab-aver" class="btn-tab" onclick="cambiarTab('aver')">⚠️ AVERIADOS</button>
    </div>

    <div id="panel-vencidos">
      <div class="pregunta-contenedor">
        <span style="font-size: 13px; font-weight: bold; color: var(--verde-frutika);">¿HAY PRODUCTOS PRÓXIMOS A VENCER?</span>
        <div class="botones-decision">
          <button type="button" id="venc-si" class="btn-sn" onclick="decidirCarga('venc', true)">SÍ</button>
          <button type="button" id="venc-no" class="btn-sn" onclick="decidirCarga('venc', false)">NO</button>
        </div>
      </div>
      <div id="seccion-vencidos" class="seccion-productos">
        <div id="cont-vencidos"></div>
        <button type="button" class="btn-add" onclick="agregarFila('venc')">+ AÑADIR PRODUCTO</button>
      </div>
    </div>

    <div id="panel-averiados" style="display:none;">
      <div class="pregunta-contenedor">
        <span style="font-size: 13px; font-weight: bold; color: var(--verde-frutika);">¿HAY PRODUCTOS AVERIADOS?</span>
        <div class="botones-decision">
          <button type="button" id="aver-si" class="btn-sn" onclick="decidirCarga('aver', true)">SÍ</button>
          <button type="button" id="aver-no" class="btn-sn" onclick="decidirCarga('aver', false)">NO</button>
        </div>
      </div>
      <div id="seccion-averiados" class="seccion-productos">
        <div id="cont-averiados"></div>
        <button type="button" class="btn-add" onclick="agregarFila('aver')">+ AÑADIR AVERÍA</button>
      </div>
    </div>

    <button type="submit" class="btn-enviar" id="btnEnvio">ENVIAR REPORTE</button>
  </form>
</div>

<!-- Datalist dinámico para productos -->
<datalist id="lista-productos-datalist"></datalist>

<script>
  // ⚠️ REEMPLAZÁ ESTA URL CON LA URL DE TU APPS SCRIPT
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx-o7PwGKadO08q7jC1__qASHLq_pSo4-A1TC4uX_mgLIucHkRXt0lmzmTthYtkYBed/exec";

  let datosPDV = {};
  let PRODUCTOS_VALIDOS = [];

  // ── Carga dinámica desde el Sheet ──────────────────────────────────────────
  async function cargarDatosSheet() {
    try {
      const res = await fetch(SCRIPT_URL);
      const datos = await res.json();

      // Poblar repositores (Hoja 2)
      datosPDV = datos.repositores;
      const datalist = document.getElementById("lista-relevadores");
      Object.keys(datosPDV).forEach(nombre => {
        const opt = document.createElement("option");
        opt.value = nombre;
        datalist.appendChild(opt);
      });

      // Poblar productos (Hoja 3)
      PRODUCTOS_VALIDOS = datos.productos;
      const prodDatalist = document.getElementById("lista-productos-datalist");
      datos.productos.forEach(p => {
        const opt = document.createElement("option");
        opt.value = p;
        prodDatalist.appendChild(opt);
      });

      // Mostrar formulario
      document.getElementById("banner-carga").style.display = "none";
      document.getElementById("formulario").style.display = "block";

    } catch (err) {
      document.getElementById("banner-carga").innerHTML = "❌ ERROR AL CARGAR DATOS. RECARGUE LA PÁGINA.";
      document.getElementById("banner-carga").style.background = "#ffcdd2";
      console.error(err);
    }
  }

  cargarDatosSheet();

  // ── Funciones del formulario ───────────────────────────────────────────────
  function actualizarPDV() {
    const v = document.getElementById("vendedor").value.trim().toUpperCase();
    const c = document.getElementById("pdv");
    c.innerHTML = '<option value="">-- SELECCIONE PDV --</option>';
    if (v && datosPDV[v]) {
      datosPDV[v].forEach(p => {
        const o = document.createElement("option");
        o.value = p; o.textContent = p; c.appendChild(o);
      });
    }
  }

  function cambiarTab(t) {
    document.getElementById('panel-vencidos').style.display = (t === 'venc') ? 'block' : 'none';
    document.getElementById('panel-averiados').style.display = (t === 'aver') ? 'block' : 'none';
    document.getElementById('tab-venc').className = (t === 'venc') ? 'btn-tab active-venc' : 'btn-tab';
    document.getElementById('tab-aver').className = (t === 'aver') ? 'btn-tab active-aver' : 'btn-tab';
  }

  let respuestas = { venc: null, aver: null };

  function decidirCarga(tipo, tiene) {
    respuestas[tipo] = tiene;
    document.getElementById(`${tipo}-si`).className = tiene ? 'btn-sn active-si' : 'btn-sn';
    document.getElementById(`${tipo}-no`).className = !tiene ? 'btn-sn active-no' : 'btn-sn';
    const secId = tipo === 'venc' ? 'seccion-vencidos' : 'seccion-averiados';
    document.getElementById(secId).style.display = tiene ? "block" : "none";
    const cont = document.getElementById(`cont-${tipo === 'venc' ? 'vencidos' : 'averiados'}`);
    if (tiene && cont.children.length === 0) agregarFila(tipo);
  }

  function validarProducto(input) {
    const row = input.parentElement;
    const errorMsg = row.querySelector(".msg-error");
    if (input.value === "" || PRODUCTOS_VALIDOS.includes(input.value)) {
      input.classList.remove('input-error');
      if (errorMsg) errorMsg.style.display = "none";
    } else {
      input.classList.add('input-error');
      if (errorMsg) errorMsg.style.display = "block";
    }
  }

  function toggleOtros(checkbox) {
    const row = checkbox.closest(".producto-row");
    const inputOtros = row.querySelector(".input-otros-especificar");
    inputOtros.style.display = checkbox.checked ? "block" : "none";
    if (!checkbox.checked) inputOtros.value = "";
  }

  function agregarFila(tipo) {
    const contenedor = document.getElementById(`cont-${tipo === 'venc' ? 'vencidos' : 'averiados'}`);
    const div = document.createElement("div");
    div.className = "producto-row";
    if (tipo === 'aver') div.style.borderLeftColor = "var(--rojo-frutika)";

    const camposVenc = `
      <div style="flex:2">
        <label>VENCIMIENTO</label>
        <input type="date" class="p-extra" required>
      </div>`;

    const camposAver = `
      <div style="flex:2">
        <label>TIPO DE AVERÍA (CHECKLIST)</label>
        <div class="checklist-container">
          <label class="check-item"><input type="checkbox" value="BOTELLA DAÑADA O GOLPEADA"> BOTELLA DAÑADA O GOLPEADA</label>
          <label class="check-item"><input type="checkbox" value="ENVASE INFLADO"> ENVASE INFLADO</label>
          <label class="check-item"><input type="checkbox" value="TAPA ROTA"> TAPA ROTA</label>
          <label class="check-item"><input type="checkbox" value="PRODUCTO DERRAMADO"> PRODUCTO DERRAMADO</label>
          <label class="check-item"><input type="checkbox" value="ETIQUETA DAÑADA"> ETIQUETA DAÑADA</label>
          <label class="check-item"><input type="checkbox" value="PRODUCTO SUCIO"> PRODUCTO SUCIO</label>
          <label class="check-item"><input type="checkbox" value="CAJA ROTA"> CAJA ROTA</label>
          <label class="check-item"><input type="checkbox" value="OTROS" onchange="toggleOtros(this)"> OTROS (ESPECIFICAR)</label>
          <input type="text" class="input-otros-especificar" placeholder="ESCRIBA EL MOTIVO..." style="display:none; margin-top:5px; padding:10px;" oninput="this.value = this.value.toUpperCase()">
        </div>
      </div>`;

    div.innerHTML = `
      <label>PRODUCTO (SELECCIÓN OBLIGATORIA)</label>
      <input type="text" list="lista-productos-datalist" class="p-prod" placeholder="BUSCAR PRODUCTO..." oninput="validarProducto(this)" required autocomplete="off">
      <span class="msg-error">⚠️ DEBE SELECCIONAR UN PRODUCTO DE LA LISTA</span>
      <div style="display:flex; flex-direction:column; gap:10px; margin-top:10px;">
        ${tipo === 'venc' ? camposVenc : camposAver}
        <div style="flex:1">
          <label>CANT. (OBLIGATORIO)</label>
          <input type="number" class="p-cant" min="1" placeholder="EJ: 5" required>
        </div>
      </div>
      <button type="button" class="btn-remove" onclick="this.parentElement.remove()">ELIMINAR</button>
      <div style="clear:both"></div>`;
    contenedor.appendChild(div);
  }

  document.getElementById("formulario").onsubmit = function(e) {
    e.preventDefault();

    if (respuestas.venc === null || respuestas.aver === null) {
      alert("DEBE COMPLETAR EL APARTADO DE PROXIMOS A VENCER Y AVERIADOS.");
      return;
    }

    let hayErrores = false;
    document.querySelectorAll(".p-prod").forEach(input => {
      if (!PRODUCTOS_VALIDOS.includes(input.value)) {
        input.classList.add('input-error');
        const errorMsg = input.parentElement.querySelector(".msg-error");
        if (errorMsg) errorMsg.style.display = "block";
        hayErrores = true;
      }
    });

    if (hayErrores) {
      alert("❌ NO SE PUEDE ENVIAR: HAY PRODUCTOS NO VÁLIDOS.");
      return;
    }

    const btn = document.getElementById("btnEnvio");
    btn.disabled = true; btn.innerText = "ENVIANDO...";

    const payload = {
      relevador: document.getElementById("vendedor").value,
      pdv: document.getElementById("pdv").value,
      vencidosRespuesta: respuestas.venc,
      averiadosRespuesta: respuestas.aver,
      vencidos: [],
      averiados: []
    };

    document.querySelectorAll("#cont-vencidos .producto-row").forEach(r => {
      payload.vencidos.push({
        producto: r.querySelector(".p-prod").value,
        extra: r.querySelector(".p-extra").value,
        cant: r.querySelector(".p-cant").value
      });
    });

    try {
      document.querySelectorAll("#cont-averiados .producto-row").forEach(r => {
        let seleccionados = [];
        r.querySelectorAll(".checklist-container input[type='checkbox']:checked").forEach(check => {
          if (check.value === "OTROS") {
            const espec = r.querySelector(".input-otros-especificar").value;
            seleccionados.push("OTROS: " + (espec ? espec : "SIN ESPECIFICAR"));
          } else {
            seleccionados.push(check.value);
          }
        });

        if (seleccionados.length === 0) {
          alert("POR FAVOR SELECCIONE AL MENOS UN TIPO DE AVERÍA.");
          btn.disabled = false; btn.innerText = "ENVIAR REPORTE";
          throw new Error("Validación Checklist fallida");
        }

        payload.averiados.push({
          producto: r.querySelector(".p-prod").value,
          observacion: seleccionados.join(" | "),
          cant: r.querySelector(".p-cant").value
        });
      });
    } catch (err) {
      return;
    }

    fetch(SCRIPT_URL, {
      method: "POST",
      mode: "no-cors",
      body: JSON.stringify(payload)
    }).then(() => {
      alert("REPORTE ENVIADO CORRECTAMENTE");
      location.reload();
    });
  };
</script>
</body>
</html>
